  - scripts/improve_description.py
  - scripts/package_skill.py
  - scripts/quick_validate.py
  - scripts/run_eval.py
  - scripts/run_loop.py
  - scripts/utils.py
version: "1.0.0"
source: https://github.com/anthropics/skills
